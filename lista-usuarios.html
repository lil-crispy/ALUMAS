<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Usuarios | ALUMAS</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1e2430;
      --muted: #657084;
      --line: #d9e0ec;
      --primary: #0f6fd8;
      --primary-dark: #0b58a8;
      --success: #177245;
      --warn: #c07a12;
      --error: #b63b3b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      padding: 24px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 1.9rem;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }

    .button:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
    }

    .button--ghost {
      background: transparent;
      color: var(--primary);
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 0.95rem;
      vertical-align: top;
    }

    th {
      background: #f7f9fd;
      font-size: 0.85rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #4a5567;
    }

    tbody tr:hover {
      background: #f9fbff;
    }

    .status {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
    }

    .status--exitoso {
      background: var(--success);
    }

    .status--rechazado {
      background: var(--warn);
    }

    .status--error {
      background: var(--error);
    }

    .empty {
      padding: 26px 20px;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      th,
      td {
        padding: 12px 10px;
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <h1>Lista de usuarios</h1>
        <p>
          Este panel muestra los accesos registrados desde `acceso-certificacion.html`
          usando el archivo `lista de usuarios.json`.
        </p>
      </div>

      <div class="hero-actions">
        <button class="button" id="refresh-button" type="button">Actualizar listado</button>
        <a class="button button--ghost" href="./certificacion-instaladores.html">Volver</a>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Registros capturados</h2>
        <span id="records-count">0 registros</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Usuario</th>
              <th>Estado</th>
              <th>Motivo</th>
              <th>Rol</th>
              <th>IP</th>
            </tr>
          </thead>
          <tbody id="records-body">
            <tr>
              <td colspan="6" class="empty">Cargando registros...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const recordsBody = document.getElementById('records-body');
    const recordsCount = document.getElementById('records-count');
    const refreshButton = document.getElementById('refresh-button');

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function formatDate(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);
      return date.toLocaleString('es-CO');
    }

    function renderRows(rows) {
      const items = Array.isArray(rows) ? [...rows].reverse() : [];
      recordsCount.textContent = `${items.length} registro${items.length === 1 ? '' : 's'}`;

      if (!items.length) {
        recordsBody.innerHTML = '<tr><td colspan="6" class="empty">Aun no hay accesos registrados.</td></tr>';
        return;
      }

      recordsBody.innerHTML = items.map((item) => {
        const estado = escapeHtml(item.estado || '');
        const estadoClass = ['exitoso', 'rechazado', 'error'].includes(item.estado) ? item.estado : 'error';

        return `
          <tr>
            <td>${escapeHtml(formatDate(item.fecha))}</td>
            <td>${escapeHtml(item.usuario || '')}</td>
            <td><span class="status status--${estadoClass}">${estado || 'sin estado'}</span></td>
            <td>${escapeHtml(item.motivo || '')}</td>
            <td>${escapeHtml(item.rol || '')}</td>
            <td>${escapeHtml(item.ip || '')}</td>
          </tr>
        `;
      }).join('');
    }

    async function loadRecords() {
      recordsBody.innerHTML = '<tr><td colspan="6" class="empty">Cargando registros...</td></tr>';

      try {
        const response = await fetch('./lista%20de%20usuarios.json', { cache: 'no-store' });
        const data = await response.json();
        renderRows(data);
      } catch (error) {
        recordsBody.innerHTML = '<tr><td colspan="6" class="empty">No fue posible cargar el listado.</td></tr>';
        recordsCount.textContent = '0 registros';
      }
    }

    refreshButton.addEventListener('click', loadRecords);
    loadRecords();
  </script>
</body>
</html>
