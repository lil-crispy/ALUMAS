<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerrando</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    body {
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .fallback {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #4b5563;
      font-size: 14px;
      background: #ffffff;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="fallback" id="fallback">La ventana se esta cerrando...</div>

  <script>
    function tryCloseWindow() {
      document.body.innerHTML = '';
      document.body.style.background = '#ffffff';

      try {
        window.open('', '_self');
      } catch {}

      try {
        window.close();
      } catch {}

      setTimeout(() => {
        try {
          history.go(-(history.length + 5));
        } catch {}
      }, 40);

      setTimeout(() => {
        try {
          window.close();
        } catch {}
      }, 90);

      setTimeout(() => {
        const fallback = document.getElementById('fallback');
        if (fallback) {
          fallback.style.display = 'flex';
        }
      }, 260);
    }

    tryCloseWindow();
  </script>
</body>
</html>
